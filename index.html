<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>NEON DASH — 킬링타임 게임</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #07070c; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  display: flex; align-items: center; justify-content: center;
  touch-action: none; user-select: none;
}
#wrap {
  position: relative;
  width: 100%; height: 100%;
  max-width: 480px; max-height: 860px;
  margin: auto;
}
canvas { display: block; width: 100%; height: 100%; background: #07070c; }

.overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; color: #eaeaf0;
  padding: 28px;
  background: radial-gradient(120% 90% at 50% 0%, rgba(20,20,40,.55), rgba(7,7,12,.9));
  backdrop-filter: blur(3px);
  transition: opacity .25s ease;
}
.hidden { opacity: 0; pointer-events: none; }

.title {
  font-size: 46px; font-weight: 800; letter-spacing: 4px;
  background: linear-gradient(90deg, #00e5ff, #ff3df0, #ffcc00);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  text-shadow: 0 0 30px rgba(0,229,255,.25);
}
.sub { margin-top: 10px; font-size: 13px; color: #8a8aa0; letter-spacing: 1px; line-height: 1.7; }
.big { font-size: 72px; font-weight: 800; margin: 4px 0; }
.lbl { font-size: 12px; letter-spacing: 3px; color: #8a8aa0; }
.row { display: flex; gap: 36px; margin: 18px 0 4px; }
.row .lbl { display: block; }
.row .v { font-size: 30px; font-weight: 700; margin-top: 4px; }
.best { color: #ffcc00; }

.btn {
  margin-top: 26px;
  padding: 15px 46px;
  font-size: 18px; font-weight: 700; letter-spacing: 2px;
  color: #07070c;
  background: linear-gradient(90deg, #00e5ff, #ff3df0);
  border: none; border-radius: 40px; cursor: pointer;
  box-shadow: 0 0 28px rgba(255,61,240,.45);
  transition: transform .08s ease;
}
.btn:active { transform: scale(.95); }

.hud {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px 20px; color: #eaeaf0; pointer-events: none;
}
.hud .score { font-size: 34px; font-weight: 800; line-height: 1; text-shadow: 0 0 14px rgba(0,229,255,.4); }
.hud .scoreLbl { font-size: 10px; letter-spacing: 3px; color: #8a8aa0; margin-bottom: 2px; }
.hud .combo { text-align: right; font-size: 16px; font-weight: 700; color: #ffcc00; min-height: 20px; transition: opacity .2s; }
.hud .bestmini { text-align: right; font-size: 11px; color: #8a8aa0; letter-spacing: 1px; }
.tag { display:inline-block; margin-top:14px; font-size:11px; color:#5a5a72; letter-spacing:1px;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div class="hud">
    <div>
      <div class="scoreLbl">SCORE</div>
      <div class="score" id="hudScore">0</div>
    </div>
    <div>
      <div class="combo" id="hudCombo"></div>
      <div class="bestmini" id="hudBest">BEST 0</div>
    </div>
  </div>

  <div class="overlay" id="menu">
    <div class="title">NEON DASH</div>
    <div class="sub">
      좌우로 움직여 <b style="color:#ff3df0">장애물</b>은 피하고<br>
      <b style="color:#00e5ff">에너지 구슬</b>은 먹어라.<br>
      오래 살수록 빨라진다. 콤보로 점수 폭발.
    </div>
    <div class="sub" style="margin-top:18px; color:#6a6a82">
      🖥 ← → / A D &nbsp;·&nbsp; 📱 화면 좌우 터치·드래그
    </div>
    <button class="btn" id="startBtn">START</button>
    <div class="tag">made for killing time ⏳</div>
  </div>

  <div class="overlay hidden" id="over">
    <div class="lbl">GAME OVER</div>
    <div class="big" id="finalScore">0</div>
    <div class="row">
      <div><span class="lbl">BEST</span><div class="v best" id="bestScore">0</div></div>
      <div><span class="lbl">콤보 MAX</span><div class="v" id="bestCombo">0</div></div>
    </div>
    <div class="sub" id="rank" style="margin-top:8px"></div>
    <button class="btn" id="retryBtn">RETRY</button>
  </div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const wrap = document.getElementById('wrap');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = wrap.clientWidth; H = wrap.clientHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- state ----
  const S = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = S.MENU;

  const player = { x: 0, y: 0, r: 13, vx: 0, tx: 0 };
  let obstacles = [], orbs = [], particles = [], stars = [];
  let score = 0, combo = 0, comboTimer = 0, maxCombo = 0;
  let speed = 0, spawnT = 0, orbT = 0, time = 0;
  let shake = 0;
  let best = +(localStorage.getItem('neondash_best') || 0);

  function initStars() {
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, z: Math.random() * 0.8 + 0.2, s: Math.random() * 1.6 + 0.4 });
    }
  }
  initStars();

  function reset() {
    player.x = W / 2; player.tx = W / 2; player.y = H - 110; player.vx = 0;
    obstacles = []; orbs = []; particles = [];
    score = 0; combo = 0; comboTimer = 0; maxCombo = 0;
    speed = 3.2; spawnT = 0; orbT = 30; time = 0; shake = 0;
  }

  // ---- input ----
  const keys = {};
  window.addEventListener('keydown', e => {
    if (['ArrowLeft','ArrowRight','a','d','A','D',' '].includes(e.key)) e.preventDefault();
    keys[e.key.toLowerCase()] = true;
    if (e.key === ' ' && state !== S.PLAY) start();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  let touching = false;
  function pointer(x) { player.tx = Math.max(player.r, Math.min(W - player.r, x)); }
  cv.addEventListener('touchstart', e => { touching = true; pointer(e.touches[0].clientX - cv.getBoundingClientRect().left); }, {passive:true});
  cv.addEventListener('touchmove', e => { if (touching) pointer(e.touches[0].clientX - cv.getBoundingClientRect().left); }, {passive:true});
  cv.addEventListener('touchend', () => { touching = false; }, {passive:true});
  cv.addEventListener('mousedown', e => { touching = true; pointer(e.offsetX); });
  cv.addEventListener('mousemove', e => { if (touching) pointer(e.offsetX); });
  window.addEventListener('mouseup', () => { touching = false; });

  // ---- UI ----
  const menu = document.getElementById('menu');
  const over = document.getElementById('over');
  const hudScore = document.getElementById('hudScore');
  const hudCombo = document.getElementById('hudCombo');
  const hudBest = document.getElementById('hudBest');
  hudBest.textContent = 'BEST ' + best;

  document.getElementById('startBtn').onclick = start;
  document.getElementById('retryBtn').onclick = start;

  function start() {
    reset();
    state = S.PLAY;
    menu.classList.add('hidden');
    over.classList.add('hidden');
  }

  function gameOver() {
    state = S.OVER;
    burst(player.x, player.y, '#00e5ff', 36);
    shake = 22;
    if (score > best) { best = score; localStorage.setItem('neondash_best', best); }
    hudBest.textContent = 'BEST ' + best;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestScore').textContent = best;
    document.getElementById('bestCombo').textContent = maxCombo;
    const ranks = [
      [0,'다음엔 더 잘할 수 있어 🐣'],
      [300,'몸 좀 푸셨네 🙂'],
      [800,'오 좀 치는데? 🔥'],
      [1600,'고수의 향기 ✨'],
      [3000,'네온의 지배자 👑'],
      [6000,'이건 사람이 아니야 🤖']
    ];
    let r = ranks[0][1];
    for (const [t, m] of ranks) if (score >= t) r = m;
    document.getElementById('rank').textContent = r;
    setTimeout(() => over.classList.remove('hidden'), 450);
  }

  // ---- helpers ----
  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, sp = Math.random() * 5 + 1;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color, r: Math.random() * 3 + 1 });
    }
  }

  function spawnObstacle() {
    const w = Math.random() * 70 + 36;
    const x = Math.random() * (W - w);
    const hue = Math.random() < .5 ? '#ff3df0' : '#ff6b3d';
    obstacles.push({ x, y: -40, w, h: 20, color: hue });
  }
  function spawnOrb() {
    orbs.push({ x: Math.random() * (W - 40) + 20, y: -20, r: 9, pulse: Math.random() * 6 });
  }

  // ---- update ----
  function update(dt) {
    time += dt;

    // stars (always animate)
    const sf = state === S.PLAY ? speed : 1.2;
    for (const st of stars) {
      st.y += st.z * sf;
      if (st.y > H) { st.y = -2; st.x = Math.random() * W; }
    }

    if (state !== S.PLAY) {
      updateParticles();
      shake *= 0.9;
      return;
    }

    // difficulty ramp
    speed += 0.0016;

    // keyboard move
    const acc = 0.9;
    if (keys['arrowleft'] || keys['a']) player.tx -= 7.5;
    if (keys['arrowright'] || keys['d']) player.tx += 7.5;
    player.tx = Math.max(player.r, Math.min(W - player.r, player.tx));
    player.vx += (player.tx - player.x) * 0.25;
    player.vx *= 0.6;
    player.x += player.vx;

    // trail
    if (Math.abs(player.vx) > 0.4 && Math.random() < .6)
      particles.push({ x: player.x, y: player.y, vx: 0, vy: 0, life: .6, color: '#00e5ff', r: player.r * 0.6, fade: true });

    // spawn
    spawnT -= dt; orbT -= dt;
    const rate = Math.max(16, 42 - speed * 2.2);
    if (spawnT <= 0) { spawnObstacle(); spawnT = rate; }
    if (orbT <= 0) { spawnOrb(); orbT = Math.random() * 40 + 35; }

    // obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.y += speed;
      if (o.y > H + 40) { obstacles.splice(i, 1); score += 5; continue; }
      // collision (circle vs rect)
      const cx = Math.max(o.x, Math.min(player.x, o.x + o.w));
      const cy = Math.max(o.y, Math.min(player.y, o.y + o.h));
      const dx = player.x - cx, dy = player.y - cy;
      if (dx * dx + dy * dy < player.r * player.r) { gameOver(); return; }
    }

    // orbs
    for (let i = orbs.length - 1; i >= 0; i--) {
      const o = orbs[i];
      o.y += speed * 0.92;
      if (o.y > H + 20) { orbs.splice(i, 1); combo = 0; continue; }
      const dx = player.x - o.x, dy = player.y - o.y;
      if (dx * dx + dy * dy < (player.r + o.r) * (player.r + o.r)) {
        orbs.splice(i, 1);
        combo++; maxCombo = Math.max(maxCombo, combo); comboTimer = 90;
        score += 20 + combo * 5;
        burst(o.x, o.y, '#00e5ff', 12);
        shake = Math.min(shake + 3, 8);
      }
    }

    if (comboTimer > 0) comboTimer -= dt; else combo = 0;
    score += dt * 0.6; // survival
    shake *= 0.86;

    updateParticles();
    hudScore.textContent = Math.floor(score);
    hudCombo.textContent = combo > 1 ? combo + 'x COMBO' : '';
    hudCombo.style.opacity = combo > 1 ? 1 : 0;
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (!p.fade) { p.vy += 0.05; }
      p.life -= 0.03;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ---- draw ----
  function draw() {
    ctx.clearRect(0, 0, W, H);
    let ox = 0, oy = 0;
    if (shake > 0.2) { ox = (Math.random() - .5) * shake; oy = (Math.random() - .5) * shake; }
    ctx.save();
    ctx.translate(ox, oy);

    // bg grid glow
    ctx.fillStyle = '#07070c';
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // stars
    for (const st of stars) {
      ctx.globalAlpha = st.z;
      ctx.fillStyle = '#5a6cff';
      ctx.fillRect(st.x, st.y, st.s, st.s * 2);
    }
    ctx.globalAlpha = 1;

    // particles
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (p.fade ? p.life : 1), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (state === S.PLAY || state === S.OVER) {
      // orbs
      for (const o of orbs) {
        o.pulse = (o.pulse || 0) + 0.15;
        const g = 1 + Math.sin(o.pulse) * 0.15;
        ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 18;
        ctx.fillStyle = '#00e5ff';
        ctx.beginPath(); ctx.arc(o.x, o.y, o.r * g, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#dffaff';
        ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 0.4, 0, Math.PI * 2); ctx.fill();
      }
      // obstacles
      for (const o of obstacles) {
        ctx.shadowColor = o.color; ctx.shadowBlur = 14;
        ctx.fillStyle = o.color;
        roundRect(o.x, o.y, o.w, o.h, 6); ctx.fill();
        ctx.shadowBlur = 0;
      }
      // player
      if (state === S.PLAY) {
        ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 22;
        const grad = ctx.createLinearGradient(player.x - player.r, player.y, player.x + player.r, player.y);
        grad.addColorStop(0, '#00e5ff'); grad.addColorStop(1, '#ff3df0');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,.85)';
        ctx.beginPath(); ctx.arc(player.x - 3, player.y - 3, player.r * 0.35, 0, Math.PI * 2); ctx.fill();
      }
    }

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- loop ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now - last) / 16.666, 3);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
