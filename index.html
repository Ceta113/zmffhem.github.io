<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#10131c">
<title>STACK! — 타워 쌓기 게임</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  display: flex; align-items: center; justify-content: center;
  background: #0b0e16; touch-action: none; user-select: none;
}
#wrap { position: relative; width: 100%; height: 100%; max-width: 480px; max-height: 880px; margin: auto; }
canvas { display: block; width: 100%; height: 100%; }

.hud {
  position: absolute; top: 0; left: 0; right: 0;
  text-align: center; padding: 26px 0 0; pointer-events: none; color: #fff;
}
.hud .score { font-size: 64px; font-weight: 800; line-height: 1; text-shadow: 0 4px 18px rgba(0,0,0,.4); }
.hud .perfect { font-size: 14px; font-weight: 700; letter-spacing: 3px; color: #ffe14d; min-height: 18px; margin-top: 8px; opacity: 0; transition: opacity .15s; }
.hud .bestmini { position:absolute; top:26px; right:20px; font-size:12px; letter-spacing:1px; color:rgba(255,255,255,.65); text-align:right;}

.overlay {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; color: #fff; padding: 30px;
  background: rgba(11,14,22,.55); backdrop-filter: blur(4px);
  transition: opacity .25s ease;
}
.hidden { opacity: 0; pointer-events: none; }
.title { font-size: 60px; font-weight: 900; letter-spacing: 2px; }
.title span { color: #ffe14d; }
.sub { margin-top: 14px; font-size: 14px; line-height: 1.8; color: rgba(255,255,255,.8); }
.lbl { font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,.55); }
.big { font-size: 78px; font-weight: 900; margin: 2px 0; }
.row { display: flex; gap: 40px; margin: 16px 0 6px; }
.row .v { font-size: 30px; font-weight: 800; margin-top: 4px; }
.best { color: #ffe14d; }
.rank { margin-top: 6px; font-size: 15px; color: rgba(255,255,255,.85); }
.btn {
  margin-top: 28px; padding: 16px 52px; font-size: 19px; font-weight: 800; letter-spacing: 2px;
  color: #10131c; background: #ffe14d; border: none; border-radius: 40px; cursor: pointer;
  box-shadow: 0 8px 24px rgba(255,225,77,.35); transition: transform .08s ease;
}
.btn:active { transform: scale(.95); }
.hint { margin-top: 22px; font-size: 12px; color: rgba(255,255,255,.5); letter-spacing: 1px; }
.tap { position:absolute; bottom:38px; left:0; right:0; text-align:center; color:rgba(255,255,255,.4); font-size:13px; letter-spacing:2px; pointer-events:none; animation: blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:.25} 50%{opacity:.7} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div class="hud">
    <div class="score" id="score" style="opacity:0">0</div>
    <div class="perfect" id="perfect">PERFECT!</div>
    <div class="bestmini" id="bestmini">BEST 0</div>
  </div>
  <div class="tap hidden" id="taphint">TAP / SPACE 로 블록 놓기</div>

  <div class="overlay" id="menu">
    <div class="title">STACK<span>!</span></div>
    <div class="sub">
      움직이는 블록을 <b>딱 맞춰</b> 쌓아 올려라.<br>
      삐져나온 부분은 잘려 나간다.<br>
      정확히 맞추면 <b style="color:#ffe14d">PERFECT</b> — 블록이 다시 커지고 보너스!
    </div>
    <button class="btn" id="startBtn">START</button>
    <div class="hint">🖥 클릭 / SPACE &nbsp;·&nbsp; 📱 화면 터치</div>
  </div>

  <div class="overlay hidden" id="over">
    <div class="lbl">GAME OVER</div>
    <div class="big" id="finalScore">0</div>
    <div class="row">
      <div><span class="lbl">BEST</span><div class="v best" id="bestScore">0</div></div>
      <div><span class="lbl">PERFECT</span><div class="v" id="perfectCount">0</div></div>
    </div>
    <div class="rank" id="rank"></div>
    <button class="btn" id="retryBtn">RETRY</button>
  </div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const wrap = document.getElementById('wrap');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = wrap.clientWidth; H = wrap.clientHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', () => { resize(); });
  resize();

  const S = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = S.MENU;

  const BH = 46;            // block height
  const BASE_W = 0.62;      // base width as fraction of W
  let blocks = [];          // placed: {x, w, color}
  let moving = null;        // {x, w, dir, speed, color}
  let falling = [];         // sliced-off pieces falling
  let particles = [];
  let camY = 0, camTarget = 0;
  let score = 0, perfectStreak = 0, perfectCount = 0;
  let perfectFlash = 0, shake = 0;
  let best = +(localStorage.getItem('stack_best') || 0);

  const scoreEl = document.getElementById('score');
  const perfectEl = document.getElementById('perfect');
  const bestmini = document.getElementById('bestmini');
  const menu = document.getElementById('menu');
  const over = document.getElementById('over');
  const taphint = document.getElementById('taphint');
  bestmini.textContent = 'BEST ' + best;

  function hsl(h) { return `hsl(${h},65%,58%)`; }
  function colorFor(i) { return hsl((i * 9 + 200) % 360); }

  function baseY() { return H - 120; } // top of the base block (world coords, before cam)

  function reset() {
    blocks = []; falling = []; particles = [];
    score = 0; perfectStreak = 0; perfectCount = 0; perfectFlash = 0; shake = 0;
    camY = 0; camTarget = 0;
    const bw = W * BASE_W;
    blocks.push({ x: (W - bw) / 2, w: bw, color: colorFor(0) });
    spawnMoving();
    scoreEl.textContent = '0';
    scoreEl.style.opacity = 1;
  }

  function spawnMoving() {
    const top = blocks[blocks.length - 1];
    const i = blocks.length;
    const speed = Math.min(3.2 + i * 0.12, 9);
    const fromLeft = Math.random() < 0.5;
    moving = {
      x: fromLeft ? -top.w : W,
      w: top.w,
      dir: fromLeft ? 1 : -1,
      speed,
      color: colorFor(i),
    };
  }

  function worldY(i) {
    // i-th block (0 = base) top position in world coordinates
    return baseY() - i * BH;
  }

  function place() {
    if (state !== S.PLAY || !moving) return;
    const top = blocks[blocks.length - 1];
    const m = moving;
    const overlapL = Math.max(m.x, top.x);
    const overlapR = Math.min(m.x + m.w, top.x + top.w);
    const overlap = overlapR - overlapL;

    if (overlap <= 0) {
      // total miss -> drop the whole block, game over
      falling.push({ x: m.x, y: worldY(blocks.length), w: m.w, h: BH, color: m.color, vy: 0, vx: m.dir * 2, rot: 0, vr: m.dir * 0.05 });
      moving = null;
      gameOver();
      return;
    }

    const diff = m.x - top.x;
    const perfectTol = 6;
    let newX = overlapL, newW = overlap;

    if (Math.abs(diff) <= perfectTol) {
      // PERFECT — snap, grow back a bit, bonus
      newX = top.x; newW = top.w;
      perfectStreak++; perfectCount++;
      perfectFlash = 1;
      perfectEl.textContent = perfectStreak > 1 ? 'PERFECT ×' + perfectStreak : 'PERFECT!';
      perfectEl.style.opacity = 1;
      shake = Math.min(shake + 4, 9);
      sliceParticles(top.x, worldY(blocks.length), top.w, m.color);
      score += 1 + perfectStreak; // streak bonus
    } else {
      perfectStreak = 0;
      perfectEl.style.opacity = 0;
      // sliced piece falls off
      let sliceX;
      if (m.x < top.x) sliceX = m.x;          // overhang on left
      else sliceX = overlapR;                  // overhang on right
      const sliceW = m.w - overlap;
      falling.push({ x: sliceX, y: worldY(blocks.length), w: sliceW, h: BH, color: m.color, vy: 0, vx: (m.x < top.x ? -1.5 : 1.5), rot: 0, vr: (m.x < top.x ? -0.04 : 0.04) });
      score += 1;
    }

    blocks.push({ x: newX, w: newW, color: m.color });
    scoreEl.textContent = score;
    setTimeout(() => { perfectEl.style.opacity = 0; }, 500);

    // camera follows up once tower is tall enough
    const stackTop = worldY(blocks.length);
    if (stackTop - camY < H * 0.42) camTarget += BH;

    spawnMoving();
  }

  function sliceParticles(x, y, w, color) {
    for (let i = 0; i < 14; i++) {
      particles.push({
        x: x + Math.random() * w, y: y + BH / 2,
        vx: (Math.random() - .5) * 4, vy: -Math.random() * 4 - 1,
        life: 1, color, r: Math.random() * 3 + 1.5
      });
    }
  }

  function gameOver() {
    state = S.OVER;
    shake = 14;
    scoreEl.style.opacity = 0;
    taphint.classList.add('hidden');
    if (score > best) { best = score; localStorage.setItem('stack_best', best); }
    bestmini.textContent = 'BEST ' + best;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestScore').textContent = best;
    document.getElementById('perfectCount').textContent = perfectCount;
    const ranks = [[0,'벽돌 한 장부터 🧱'],[10,'기초공사 완료 🙂'],[25,'제법 높은데? 🏗'],[50,'고층 빌딩 시공사 🏙'],[90,'마천루의 지배자 🌇'],[150,'우주까지 쌓을 기세 🚀']];
    let r = ranks[0][1];
    for (const [t, m] of ranks) if (score >= t) r = m;
    document.getElementById('rank').textContent = r;
    setTimeout(() => over.classList.remove('hidden'), 400);
  }

  // input
  function tap() {
    if (state === S.PLAY) place();
  }
  window.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (state === S.PLAY) place(); else if (state !== S.PLAY) start();
    }
  });
  cv.addEventListener('pointerdown', e => { e.preventDefault(); tap(); });

  document.getElementById('startBtn').onclick = start;
  document.getElementById('retryBtn').onclick = start;

  function start() {
    reset();
    state = S.PLAY;
    menu.classList.add('hidden');
    over.classList.add('hidden');
    taphint.classList.remove('hidden');
    setTimeout(() => taphint.classList.add('hidden'), 2200);
  }

  // update
  function update(dt) {
    camY += (camTarget - camY) * 0.1;
    perfectFlash *= 0.9;
    shake *= 0.85;

    if (state === S.PLAY && moving) {
      moving.x += moving.dir * moving.speed * dt;
      const top = blocks[blocks.length - 1];
      // bounce within a margin around current stack
      const leftLimit = -moving.w * 0.5;
      const rightLimit = W - moving.w * 0.5;
      if (moving.x < leftLimit) { moving.x = leftLimit; moving.dir = 1; }
      if (moving.x > rightLimit) { moving.x = rightLimit; moving.dir = -1; }
    }

    for (let i = falling.length - 1; i >= 0; i--) {
      const f = falling[i];
      f.vy += 0.6 * dt; f.y += f.vy * dt; f.x += f.vx * dt; f.rot += f.vr * dt;
      if (f.y - camY > H + 80) falling.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vy += 0.25 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= 0.025 * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // draw
  function bgGradient() {
    const lvl = blocks.length;
    const hue = (lvl * 4 + 210) % 360;
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, `hsl(${hue},45%,16%)`);
    g.addColorStop(1, `hsl(${(hue + 30) % 360},50%,8%)`);
    return g;
  }

  function block(x, yTop, w, color, rot) {
    const sy = yTop - camY;
    if (rot) {
      ctx.save();
      ctx.translate(x + w / 2, sy + BH / 2);
      ctx.rotate(rot);
      drawBox(-w / 2, -BH / 2, w, BH, color);
      ctx.restore();
    } else {
      drawBox(x, sy, w, BH, color);
    }
  }
  function drawBox(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
    // top highlight
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    ctx.fillRect(x, y, w, 5);
    // bottom shade
    ctx.fillStyle = 'rgba(0,0,0,.16)';
    ctx.fillRect(x, y + h - 5, w, 5);
  }

  function draw() {
    let ox = 0, oy = 0;
    if (shake > 0.3) { ox = (Math.random() - .5) * shake; oy = (Math.random() - .5) * shake; }
    ctx.save(); ctx.translate(ox, oy);

    ctx.fillStyle = bgGradient();
    ctx.fillRect(-20, -20, W + 40, H + 40);

    if (perfectFlash > 0.02) {
      ctx.fillStyle = `rgba(255,225,77,${perfectFlash * 0.18})`;
      ctx.fillRect(-20, -20, W + 40, H + 40);
    }

    if (state !== S.MENU) {
      for (let i = 0; i < blocks.length; i++) {
        block(blocks[i].x, worldY(i), blocks[i].w, blocks[i].color, 0);
      }
      for (const f of falling) block(f.x, f.y, f.w, f.color, f.rot);
      if (state === S.PLAY && moving) block(moving.x, worldY(blocks.length), moving.w, moving.color, 0);

      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.r / 2, p.y - camY - p.r / 2, p.r, p.r);
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now - last) / 16.666, 2.2);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
